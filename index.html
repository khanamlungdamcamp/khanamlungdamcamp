    <script>
        function generatePromptPayPayload(phoneNumber, amount) {
            const formatData = (id, value) => { const valStr = String(value); return id + String(valStr.length).padStart(2, '0') + valStr; };
            const crc16 = (data) => { let crc = 0xFFFF; for (let i = 0; i < data.length; i++) { crc ^= data.charCodeAt(i) << 8; for (let j = 0; j < 8; j++) { if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021; else crc <<= 1; } } return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0'); };
            
            let phoneStr = phoneNumber.replace(/[^0-9]/g, '');
            if (phoneStr.startsWith('0')) phoneStr = '66' + phoneStr.substring(1);
            else if (!phoneStr.startsWith('66')) phoneStr = '66' + phoneStr;
            phoneStr = phoneStr.padStart(13, '0');

            const payloadFormatIndicator = formatData('00', '01');
            const pointOfInitiationMethod = formatData('01', amount ? '12' : '11');
            const merchantAccountInformation = formatData('29', formatData('00', 'A000000677010111') + formatData('01', phoneStr));
            const countryCode = formatData('58', 'TH');
            const currencyCode = formatData('53', '764');
            const transactionAmount = amount ? formatData('54', parseFloat(amount).toFixed(2)) : '';
            const dataToCrc = payloadFormatIndicator + pointOfInitiationMethod + merchantAccountInformation + countryCode + currencyCode + transactionAmount + '6304';
            return dataToCrc + crc16(dataToCrc);
        }
    </script>

<body className="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 antialiased selection:bg-green-200 selection:text-green-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQwfb8tpHoZg1z4UnjtMH-I96WNDPNga0pZbc9fQkSY0jTow1gDvD4M_ek_G-bl1hx7g/exec"; 
        const LIFF_ID = "2006764516-G42qoxV7"; 
        const SHOP_PROMPTPAY = "0615924262";
        
        let ROOM_IDS = ['R1','R2','R3','T1','T2','K1','K2','Z8'];
        let ROOM_NAMES = { 'R1': 'โฮมสเตย์หนำโป', 'R2': 'บ้านพักริมน้ำ 1', 'R3': 'บ้านพักริมน้ำ 2', 'T1': 'เต็นท์กระโจม 1', 'T2': 'เต็นท์กระโจม 2', 'K1': 'เช่าเต็นท์สนาม K1', 'K2': 'เช่าเต็นท์สนาม K2', 'Z8': 'ลานกางเต็นท์' };
        let ROOM_TYPES = { 'R1': 'room', 'R2': 'room', 'R3': 'room', 'T1': 'tent', 'T2': 'tent', 'K1': 'tent_rent', 'K2': 'tent_rent', 'Z8': 'ground' };

        const formatMoney = (val) => Number(val || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        const fetchWithTimeout = async (resource, options = {}) => {
            const { timeout = 20000 } = options; const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout);
            try { const response = await fetch(resource, { ...options, signal: controller.signal }); clearTimeout(id); return response; } 
            catch (error) { clearTimeout(id); throw error; }
        };
        const compressImage = async (file, quality = 0.8, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                        if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        };

        // UI Components
        const InputField = ({ label, icon, ...props }) => (
            <div className="mb-4">
                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">{label}</label>
                <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className={`fas ${icon} text-gray-400`}></i></div>
                    <input className="w-full pl-10 pr-3 py-2.5 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 bg-white dark:bg-gray-800 text-gray-900 dark:text-white transition shadow-sm" {...props} />
                </div>
            </div>
        );

        const SectionCard = ({ title, icon, children }) => (
            <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5 mb-5 hover:shadow-md transition">
                <h3 className="text-lg font-bold text-gray-800 dark:text-white border-b border-gray-100 dark:border-gray-700 pb-3 mb-4 flex items-center gap-2"><i className={`fas ${icon} text-green-500`}></i> {title}</h3>
                {children}
            </div>
        );

        const DatePickerRow = ({ checkIn, setCheckIn, checkOut, setCheckOut }) => {
            const today = new Date().toISOString().split('T')[0];
            return (
                <div className="grid grid-cols-2 gap-4">
                    <div>
                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">วันเข้าพัก (Check-in)</label>
                        <input type="date" min={today} value={checkIn} onChange={e => { setCheckIn(e.target.value); if(checkOut <= e.target.value) { const nextDay = new Date(e.target.value); nextDay.setDate(nextDay.getDate() + 1); setCheckOut(nextDay.toISOString().split('T')[0]); } }} className="w-full p-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl font-bold text-gray-800 dark:text-white shadow-inner focus:ring-2 focus:ring-green-500 outline-none transition" />
                    </div>
                    <div>
                        <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">วันออก (Check-out)</label>
                        <input type="date" min={checkIn || today} value={checkOut} onChange={e => setCheckOut(e.target.value)} className="w-full p-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl font-bold text-gray-800 dark:text-white shadow-inner focus:ring-2 focus:ring-green-500 outline-none transition" />
                    </div>
                </div>
            );
        };

        const RoomSelection = ({ roomConfig, availability, formRooms, onToggleRoom, onUpdateGuests, guests, mapConfig, activeTab, onPinClick }) => {
            const sortedRooms = Object.values(roomConfig).sort((a,b) => {
                const order = { 'room': 1, 'tent': 2, 'tent_rent': 3, 'ground': 4 };
                if (order[a.type] !== order[b.type]) return order[a.type] - order[b.type];
                return a.id.localeCompare(b.id);
            });

            if (activeTab === 'map') {
                return (
                    <div className="relative inline-block w-full" onClick={(e) => e.stopPropagation()}>
                        {sortedRooms.map(r => {
                            if(!mapConfig[r.id]) return null;
                            const isBooked = availability?.bookedRooms?.includes(r.id);
                            const isZ8Full = r.id === 'Z8' && availability?.zone8Available <= 0;
                            const isDisabled = isBooked || isZ8Full;
                            const isSelected = formRooms.some(fr => fr.id === r.id);
                            
                            let pinClass = "map-pin ";
                            if (isDisabled) pinClass += "booked ";
                            else if (isSelected) pinClass += "selected ";
                            else pinClass += "available ";

                            return (
                                <div key={r.id} className={pinClass} style={{ left: `${mapConfig[r.id].x}%`, top: `${mapConfig[r.id].y}%` }} 
                                     onClick={(e) => { e.stopPropagation(); if(!isDisabled) onPinClick(r); }}>
                                    {r.id.replace(/[^0-9]/g, '')}
                                </div>
                            );
                        })}
                    </div>
                );
            }

            return (
                <div className="space-y-3 mt-4">
                    {sortedRooms.map(r => {
                        const isBooked = availability?.bookedRooms?.includes(r.id);
                        const isZ8Full = r.id === 'Z8' && availability?.zone8Available <= 0;
                        const isDisabled = isBooked || isZ8Full;
                        const isSelected = formRooms.some(fr => fr.id === r.id);
                        const formRoomData = formRooms.find(fr => fr.id === r.id);
                        const rGuests = formRoomData ? formRoomData.guests : r.min;

                        return (
                            <div key={r.id} className={`border ${isSelected ? 'border-green-500 bg-green-50/50 dark:bg-green-900/20' : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800'} rounded-xl p-4 transition-all duration-200 shadow-sm hover:shadow ${isDisabled ? 'opacity-50 grayscale' : ''}`}>
                                <div className="flex justify-between items-start mb-2">
                                    <label className={`flex items-start gap-3 ${isDisabled ? 'cursor-not-allowed' : 'cursor-pointer'} flex-1`}>
                                        <div className="pt-1">
                                            <input type="checkbox" className="w-5 h-5 text-green-600 rounded border-gray-300 focus:ring-green-500 disabled:opacity-50" disabled={isDisabled} checked={isSelected} onChange={(e) => onToggleRoom(r, e.target.checked)} />
                                        </div>
                                        <div>
                                            <h4 className={`font-bold ${isSelected ? 'text-green-800 dark:text-green-400' : 'text-gray-800 dark:text-white'}`}>{r.name}</h4>
                                            <div className="text-xs text-gray-500 dark:text-gray-400 mt-1 flex flex-wrap gap-2">
                                                <span><i className="fas fa-user mr-1"></i>พักได้ {r.min}-{r.maxCap} ท่าน</span>
                                                {r.bf && <span className="text-orange-500"><i className="fas fa-coffee mr-1"></i>รวมอาหารเช้า</span>}
                                            </div>
                                            {r.id === 'Z8' && availability && ( <div className="text-xs font-bold text-blue-600 dark:text-blue-400 mt-1"><i className="fas fa-campground mr-1"></i>เหลือพื้นที่ว่าง {availability.zone8Available} คิว</div> )}
                                        </div>
                                    </label>
                                    <div className="text-right">
                                        <div className="font-bold text-green-600 dark:text-green-400 text-lg">{formatMoney(r.pricing.tiers[0].price)}฿</div>
                                        <div className="text-[10px] text-gray-400">ราคาเริ่มต้น/คืน</div>
                                        {isDisabled && <span className="inline-block mt-1 bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold">ไม่ว่าง</span>}
                                    </div>
                                </div>
                                
                                {isSelected && (
                                    <div className="mt-3 pt-3 border-t border-green-200 dark:border-green-800 flex justify-between items-center animate-fade-in">
                                        <span className="text-sm font-bold text-gray-700 dark:text-gray-300">ระบุจำนวนผู้เข้าพัก:</span>
                                        <div className="flex items-center gap-3 bg-white dark:bg-gray-700 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600">
                                            <button type="button" onClick={() => onUpdateGuests(r.id, -1)} disabled={rGuests <= r.min} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-600 hover:bg-gray-200 dark:hover:bg-gray-500 text-gray-800 dark:text-white flex items-center justify-center disabled:opacity-30 transition"><i className="fas fa-minus text-xs"></i></button>
                                            <span className="font-bold w-4 text-center">{rGuests}</span>
                                            <button type="button" onClick={() => onUpdateGuests(r.id, 1)} disabled={rGuests >= r.maxCap} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-600 hover:bg-gray-200 dark:hover:bg-gray-500 text-gray-800 dark:text-white flex items-center justify-center disabled:opacity-30 transition"><i className="fas fa-plus text-xs"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const FoodMenu = ({ menu, cart, onUpdateQty }) => {
            if (!menu || menu.length === 0) return <div className="text-center text-gray-400 text-sm py-4">ไม่มีรายการอาหารในขณะนี้</div>;
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {menu.map(item => {
                        const qty = cart.find(c => c.id === item.id)?.qty || 0;
                        return (
                            <div key={item.id} className={`flex gap-3 p-3 border rounded-xl transition ${qty > 0 ? 'border-orange-500 bg-orange-50/30 dark:bg-orange-900/20' : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800'}`}>
                                <div className="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100 dark:bg-gray-700">
                                    {item.img ? <img src={item.img} alt={item.name} className="w-full h-full object-cover" loading="lazy" /> : <div className="w-full h-full flex items-center justify-center"><i className="fas fa-utensils text-gray-400"></i></div>}
                                </div>
                                <div className="flex-1 flex flex-col justify-between">
                                    <div>
                                        <div className="font-bold text-gray-800 dark:text-white text-sm line-clamp-1">{item.name}</div>
                                        <div className="text-xs text-gray-500 dark:text-gray-400 line-clamp-1">{item.desc}</div>
                                        <div className="text-orange-600 dark:text-orange-400 font-bold text-sm mt-1">{item.price} ฿</div>
                                    </div>
                                    <div className="flex justify-end items-center gap-3 mt-2">
                                        {qty > 0 ? (
                                            <div className="flex items-center gap-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg p-0.5">
                                                <button type="button" onClick={() => onUpdateQty(item, -1)} className="w-7 h-7 flex items-center justify-center bg-gray-100 dark:bg-gray-600 rounded hover:bg-gray-200 dark:hover:bg-gray-500"><i className="fas fa-minus text-[10px]"></i></button>
                                                <span className="text-sm font-bold w-4 text-center">{qty}</span>
                                                <button type="button" onClick={() => onUpdateQty(item, 1)} className="w-7 h-7 flex items-center justify-center bg-orange-100 dark:bg-orange-900/50 text-orange-600 dark:text-orange-400 rounded hover:bg-orange-200 dark:hover:bg-orange-800"><i className="fas fa-plus text-[10px]"></i></button>
                                            </div>
                                        ) : (
                                            <button type="button" onClick={() => onUpdateQty(item, 1)} className="text-xs font-bold text-orange-600 dark:text-orange-400 border border-orange-200 dark:border-orange-800 bg-orange-50 dark:bg-orange-900/30 px-3 py-1.5 rounded-lg hover:bg-orange-100 dark:hover:bg-orange-900/60 transition">+ เพิ่ม</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const CampingLoader = ({ text = "กำลังโหลด..." }) => (
            <div className="fixed inset-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-sm flex items-center justify-center z-[9999] transition-opacity duration-300">
                <div className="flex flex-col items-center animate-pop">
                    <div className="relative w-24 h-24 mb-4 flex items-center justify-center">
                        <i className="fas fa-tree text-green-600 dark:text-green-500 text-4xl absolute -left-4 animate-pulse"></i>
                        <i className="fas fa-campground text-blue-600 dark:text-blue-500 text-6xl relative z-10 animate-bounce"></i>
                        <i className="fas fa-fire text-orange-500 text-3xl absolute -right-2 bottom-0 animate-pulse" style={{animationDelay: '0.2s'}}></i>
                    </div>
                    <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2 tracking-wide">{text}</h3>
                    <div className="flex gap-2 mt-2">
                        <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0s'}}></div>
                        <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0.15s'}}></div>
                        <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0.3s'}}></div>
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [loading, setLoading] = React.useState(true);
            const [loadingText, setLoadingText] = React.useState("กำลังเตรียมแคมป์...");
            const [liffProfile, setLiffProfile] = React.useState(null);
            
            const [activeTab, setActiveTab] = React.useState('list');
            const [darkMode, setDarkMode] = React.useState(false);
            
            const [siteSettings, setSiteSettings] = React.useState(null);
            const [systemSettings, setSystemSettings] = React.useState(null);
            const [roomConfig, setRoomConfig] = React.useState({});
            const [mapConfig, setMapConfig] = React.useState({});
            
            const [form, setForm] = React.useState({ name: '', phone: '', checkIn: '', checkOut: '', rooms: [], food: [], discountCode: '' });
            const [availability, setAvailability] = React.useState(null);
            
            const [summary, setSummary] = React.useState({ roomTotal: 0, foodTotal: 0, discount: 0, netTotal: 0, deposit: 0 });
            const [slipBase64, setSlipBase64] = React.useState('');
            
            const [modalAlert, setModalAlert] = React.useState({ show: false, text: '', title: 'แจ้งเตือน', type: 'info' });
            const [modalConfirm, setModalConfirm] = React.useState({ show: false, text: '', title: 'ยืนยัน', onConfirm: null });

            React.useEffect(() => {
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                setDarkMode(isDark); if (isDark) document.documentElement.classList.add('dark');
            }, []);

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                if (!darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            };

            const showAlert = (text, title = 'แจ้งเตือน', type = 'info') => setModalAlert({ show: true, text, title, type });
            const showConfirm = (text, onConfirm, title = 'ยืนยันการทำรายการ') => setModalConfirm({ show: true, text, onConfirm, title });

            // 1. LIFF Init & Initial Data Fetch
            React.useEffect(() => {
                const initApp = async () => {
                    try {
                        setLoadingText("กำลังเชื่อมต่อ LINE...");
                        await liff.init({ liffId: LIFF_ID });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setLiffProfile(profile);
                            setForm(f => ({ ...f, name: profile.displayName }));
                        } else {
                            liff.login(); return;
                        }

                        setLoadingText("โหลดข้อมูลที่พัก...");
                        const res = await fetchWithTimeout(`${GOOGLE_SCRIPT_URL}?action=getInitialData&_t=${Date.now()}`);
                        const json = await res.json();
                        
                        if (json.status === 'success') {
                            setSiteSettings(json.data.siteConfig);
                            setSystemSettings(json.data.settings);
                            setRoomConfig(json.data.roomConfig);
                            setMapConfig(json.data.mapConfig);
                            
                            // Set dynamic room IDs/Names
                            const loadedIds = Object.keys(json.data.roomConfig);
                            if (loadedIds.length > 0) {
                                ROOM_IDS = loadedIds;
                                ROOM_NAMES = {}; ROOM_TYPES = {};
                                loadedIds.forEach(id => {
                                    ROOM_NAMES[id] = json.data.roomConfig[id].name;
                                    ROOM_TYPES[id] = json.data.roomConfig[id].type;
                                });
                            }

                            const today = new Date();
                            const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
                            const dayAfter = new Date(tomorrow); dayAfter.setDate(dayAfter.getDate() + 1);
                            setForm(f => ({ ...f, checkIn: tomorrow.toISOString().split('T')[0], checkOut: dayAfter.toISOString().split('T')[0] }));
                        } else {
                            showAlert("โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่", "ข้อผิดพลาด", "error");
                        }
                    } catch (error) {
                        console.error(error);
                        showAlert("การเชื่อมต่อมีปัญหา กรุณาเปิดใหม่", "ข้อผิดพลาด", "error");
                    } finally {
                        setLoading(false);
                    }
                };
                initApp();
            }, []);

            // 2. Check Availability when Dates change
            React.useEffect(() => {
                if (form.checkIn && form.checkOut && form.checkIn < form.checkOut) {
                    const checkAvail = async () => {
                        setLoading(true); setLoadingText("ตรวจสอบห้องว่าง...");
                        try {
                            const res = await fetchWithTimeout(`${GOOGLE_SCRIPT_URL}?action=getAvailability&checkIn=${form.checkIn}&checkOut=${form.checkOut}&_t=${Date.now()}`);
                            const json = await res.json();
                            if (json.status === 'success') {
                                setAvailability(json);
                                // Remove booked rooms from current selection
                                setForm(f => ({
                                    ...f,
                                    rooms: f.rooms.filter(r => !json.bookedRooms.includes(r.id) && !(r.id === 'Z8' && json.zone8Available <= 0))
                                }));
                            }
                        } catch (e) {
                            showAlert("ไม่สามารถเช็คห้องว่างได้", "ข้อผิดพลาด", "error");
                        } finally {
                            setLoading(false);
                        }
                    };
                    checkAvail();
                }
            }, [form.checkIn, form.checkOut]);

            // 3. Calculate Summary whenever cart changes
            React.useEffect(() => {
                if (!form.checkIn || !form.checkOut) return;
                
                const cIn = new Date(form.checkIn); const cOut = new Date(form.checkOut);
                const nights = Math.max(1, Math.ceil((cOut - cIn) / (1000 * 60 * 60 * 24)));
                
                let rTotal = 0;
                form.rooms.forEach(r => {
                    const config = roomConfig[r.id];
                    if (config && config.pricing) {
                        const tier = config.pricing.tiers.find(t => r.guests <= t.max) || config.pricing.tiers[config.pricing.tiers.length - 1];
                        rTotal += (tier.price * nights);
                    }
                });

                const fTotal = form.food.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const totalBeforeDisc = rTotal + fTotal;
                
                let disc = 0;
                if (form.discountCode && systemSettings?.discounts) {
                    const dConf = systemSettings.discounts.find(d => d.code.toUpperCase() === form.discountCode.toUpperCase());
                    if (dConf) disc = dConf.type === 'PERCENT' ? (totalBeforeDisc * (dConf.value / 100)) : dConf.value;
                }
                
                const net = Math.max(0, totalBeforeDisc - disc);
                
                // Check Special Days for Deposit
                let isSpecial = false;
                if (systemSettings?.special) {
                    for (let d = new Date(cIn); d < cOut; d.setDate(d.getDate() + 1)) {
                        const dStr = d.toISOString().split('T')[0];
                        if (systemSettings.special.some(s => s.date === dStr)) { isSpecial = true; break; }
                    }
                }
                
                // Rule: Deposit is 50% of Room Price, full food price. If special day, 100% of room price.
                const dep = isSpecial ? net : ((rTotal * 0.5) + fTotal - disc);

                setSummary({ roomTotal: rTotal, foodTotal: fTotal, discount: disc, netTotal: net, deposit: Math.max(0, dep) });
            }, [form.rooms, form.food, form.checkIn, form.checkOut, form.discountCode, roomConfig, systemSettings]);

            // Form Handlers
            const handleToggleRoom = (room, isSelected) => {
                setForm(f => {
                    if (isSelected) return { ...f, rooms: [...f.rooms, { id: room.id, guests: room.min, name: room.name, type: room.type }] };
                    return { ...f, rooms: f.rooms.filter(r => r.id !== room.id) };
                });
            };

            const handleUpdateGuests = (roomId, delta) => {
                setForm(f => ({
                    ...f, rooms: f.rooms.map(r => {
                        if (r.id === roomId) {
                            const config = roomConfig[roomId];
                            const newGuests = Math.max(config.min, Math.min(config.maxCap, r.guests + delta));
                            return { ...r, guests: newGuests };
                        }
                        return r;
                    })
                }));
            };

            const handleUpdateFoodQty = (item, delta) => {
                setForm(f => {
                    const existing = f.food.find(fi => fi.id === item.id);
                    let newFood = [...f.food];
                    if (existing) {
                        const newQty = existing.qty + delta;
                        if (newQty <= 0) newFood = newFood.filter(fi => fi.id !== item.id);
                        else newFood = newFood.map(fi => fi.id === item.id ? { ...fi, qty: newQty } : fi);
                    } else if (delta > 0) {
                        newFood.push({ id: item.id, name: item.name, price: item.price, qty: 1 });
                    }
                    return { ...f, food: newFood };
                });
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) return showAlert("ขนาดไฟล์สลิปใหญ่เกินไป (จำกัด 5MB)", "แจ้งเตือน", "warning");
                try {
                    setLoading(true); setLoadingText("กำลังบีบอัดรูปภาพ...");
                    const base64 = await compressImage(file);
                    setSlipBase64(base64);
                } catch (err) {
                    showAlert("ไม่สามารถอ่านไฟล์รูปภาพได้", "ข้อผิดพลาด", "error");
                } finally { setLoading(false); }
            };

            const handleSubmit = () => {
                if (!form.name.trim() || !form.phone.trim()) return showAlert("กรุณากรอกชื่อและเบอร์โทรติดต่อ", "ข้อมูลไม่ครบ");
                if (form.phone.length < 9) return showAlert("กรุณากรอกเบอร์โทรให้ถูกต้อง", "ข้อมูลไม่ครบ");
                if (form.rooms.length === 0) return showAlert("กรุณาเลือกห้องพักอย่างน้อย 1 ห้อง", "ข้อมูลไม่ครบ");
                if (!slipBase64) return showAlert("กรุณาแนบสลิปโอนเงินมัดจำ", "ข้อมูลไม่ครบ");

                // Check System Closed Dates
                if (systemSettings?.closed) {
                    for (let d = new Date(form.checkIn); d < new Date(form.checkOut); d.setDate(d.getDate() + 1)) {
                        const dStr = d.toISOString().split('T')[0];
                        const closed = systemSettings.closed.find(c => c.date === dStr);
                        if (closed) return showAlert(`ไม่สามารถจองได้ในช่วงวันที่ ${dStr} เนื่องจาก: ${closed.reason}`, "ปิดบริการ");
                    }
                }

                showConfirm(
                    `ตรวจสอบความถูกต้อง\n- ชื่อ: ${form.name}\n- เข้าพัก: ${form.checkIn} ถึง ${form.checkOut}\n- ยอดมัดจำ: ${formatMoney(summary.deposit)} บาท\n\nยืนยันการส่งข้อมูลการจอง?`,
                    async () => {
                        setLoading(true); setLoadingText("กำลังส่งข้อมูลการจอง...");
                        
                        const cIn = new Date(form.checkIn); const cOut = new Date(form.checkOut);
                        const nights = Math.max(1, Math.ceil((cOut - cIn) / (1000 * 60 * 60 * 24)));
                        
                        const cartPayload = [
                            ...form.rooms.map(r => {
                                const config = roomConfig[r.id];
                                const tier = config.pricing.tiers.find(t => r.guests <= t.max) || config.pricing.tiers[config.pricing.tiers.length - 1];
                                return { id: r.id, name: r.name, type: r.type, guests: r.guests, qty: 1, nights: nights, pricePerNight: tier.price };
                            }),
                            ...form.food.map(f => ({ id: f.id, name: f.name, type: 'food', qty: f.qty, price: f.price }))
                        ];

                        const payload = {
                            action: 'submitBooking',
                            customer: { name: form.name, phone: form.phone, lineId: liffProfile?.userId || 'unknown', lineProfile: liffProfile?.displayName || form.name },
                            checkIn: form.checkIn, checkOut: form.checkOut,
                            cart: cartPayload,
                            totalGuests: form.rooms.reduce((s, r) => s + r.guests, 0),
                            price: summary.netTotal, deposit: summary.deposit,
                            slipBase64: slipBase64,
                            discountCode: form.discountCode
                        };

                        try {
                            const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                            const json = await res.json();
                            setLoading(false);
                            
                            if (json.status === 'success') {
                                showAlert("ระบบได้รับข้อมูลการจองของท่านแล้ว กรุณารอข้อความยืนยันทาง LINE ภายใน 15 นาที", "จองสำเร็จ!", "success");
                                setTimeout(() => liff.closeWindow(), 3000);
                            } else {
                                showAlert(`เกิดข้อผิดพลาด: ${json.message}`, "จองไม่สำเร็จ", "error");
                            }
                        } catch (e) {
                            setLoading(false); showAlert("การเชื่อมต่อล้มเหลว กรุณาลองใหม่อีกครั้ง", "ข้อผิดพลาด", "error");
                        }
                    }
                );
            };

            // Render Views
            if (loading && !siteSettings) return <CampingLoader text={loadingText} />;

            return (
                <div className="pb-24">
                    {/* Header Banner */}
                    <div className="relative h-48 md:h-64 overflow-hidden">
                        {siteSettings?.bannerUrl ? ( <img src={siteSettings.bannerUrl} alt="Banner" className="w-full h-full object-cover" /> ) : ( <div className="w-full h-full bg-green-700"></div> )}
                        <div className="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white px-4">
                            {siteSettings?.logoUrl && <img src={siteSettings.logoUrl} alt="Logo" className="w-20 h-20 md:w-24 md:h-24 object-cover rounded-full border-2 border-white shadow-lg mb-3" />}
                            <h1 className="text-2xl md:text-3xl font-bold tracking-wide shadow-black text-center">{siteSettings?.headerTitle || "ขนำลุงดำ แคมป์ปิ้ง"}</h1>
                            <p className="text-sm mt-1 opacity-90 shadow-black text-center">{siteSettings?.headerDesc}</p>
                        </div>
                        <button onClick={toggleDarkMode} className="absolute top-4 right-4 w-10 h-10 bg-white/20 backdrop-blur-md rounded-full text-white flex items-center justify-center hover:bg-white/30 transition">
                            <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                        </button>
                    </div>

                    <div className="max-w-3xl mx-auto px-4 -mt-6 relative z-10">
                        {/* 1. Customer Info */}
                        <SectionCard title="ข้อมูลผู้ติดต่อ" icon="fa-id-card">
                            <InputField label="ชื่อ-สกุล" icon="fa-user" placeholder="กรอกชื่อ-สกุล" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                            <InputField label="เบอร์โทรศัพท์" icon="fa-phone" placeholder="08xxxxxxxx" type="tel" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
                        </SectionCard>

                        {/* 2. Check-in/out Dates */}
                        <SectionCard title="เลือกวันเข้าพัก" icon="fa-calendar-alt">
                            <DatePickerRow checkIn={form.checkIn} setCheckIn={val => setForm({...form, checkIn: val})} checkOut={form.checkOut} setCheckOut={val => setForm({...form, checkOut: val})} />
                        </SectionCard>

                        {/* 3. Room Selection (Tabs & List/Map) */}
                        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-5">
                            <div className="flex border-b border-gray-200 dark:border-gray-700">
                                <button onClick={() => setActiveTab('list')} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors ${activeTab === 'list' ? 'text-green-600 border-b-2 border-green-600 bg-green-50/50 dark:bg-gray-800 dark:text-green-400' : 'text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700'}`}><i className="fas fa-list-ul"></i> เลือกห้องพัก</button>
                                <button onClick={() => setActiveTab('map')} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors ${activeTab === 'map' ? 'text-green-600 border-b-2 border-green-600 bg-green-50/50 dark:bg-gray-800 dark:text-green-400' : 'text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700'}`}><i className="fas fa-map-marked-alt"></i> แผนที่แคมป์</button>
                            </div>
                            
                            <div className="p-5 bg-gray-50/50 dark:bg-gray-900/50">
                                {activeTab === 'map' && (
                                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden animate-fade-in flex items-center justify-center min-h-[60vh] p-2">
                                        <div className="relative inline-block w-full max-w-[800px] mx-auto overflow-hidden rounded-lg">
                                            {/* --- แก้ไขส่วนนี้: ดึงรูปภาพแผนที่จาก siteSettings --- */}
                                            <img src={siteSettings?.roomImages?.['MAP_BG']?.[0] || "https://img2.pic.in.th/3d539b84-44ce-4336-ad90-bd2f84b13eca.jpg"} className="w-full h-auto block pointer-events-none select-none object-contain" alt="Camp Map" />
                                            <RoomSelection roomConfig={roomConfig} availability={availability} formRooms={form.rooms} mapConfig={mapConfig} activeTab={activeTab} onPinClick={(room) => { const isSelected = form.rooms.some(fr => fr.id === room.id); handleToggleRoom(room, !isSelected); }} />
                                            <div className="absolute top-2 right-2 bg-white/90 dark:bg-gray-800/90 backdrop-blur text-[10px] p-2 rounded shadow-sm flex flex-col gap-1 border border-gray-200 dark:border-gray-700">
                                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full bg-green-500 border border-white"></div><span className="dark:text-gray-200">ว่าง</span></div>
                                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full bg-red-500 border border-white opacity-80"></div><span className="dark:text-gray-200">เต็ม</span></div>
                                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-full bg-blue-500 border-2 border-yellow-400"></div><span className="dark:text-gray-200">เลือก</span></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {activeTab === 'list' && (
                                    <div className="animate-fade-in">
                                        {availability ? (
                                            <RoomSelection roomConfig={roomConfig} availability={availability} formRooms={form.rooms} onToggleRoom={handleToggleRoom} onUpdateGuests={handleUpdateGuests} activeTab={activeTab} />
                                        ) : (
                                            <div className="text-center py-10 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
                                                <i className="fas fa-calendar-check text-4xl text-gray-300 dark:text-gray-600 mb-3"></i>
                                                <p className="text-gray-500 dark:text-gray-400 text-sm">กรุณาเลือกวันที่เข้าพัก<br/>เพื่อตรวจสอบห้องว่าง</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 4. Food Menu */}
                        {siteSettings?.foodMenu && siteSettings.foodMenu.length > 0 && (
                            <SectionCard title="สั่งอาหาร/บริการเสริมล่วงหน้า" icon="fa-concierge-bell">
                                <FoodMenu menu={siteSettings.foodMenu} cart={form.food} onUpdateQty={handleUpdateFoodQty} />
                            </SectionCard>
                        )}

                        {/* 5. Payment & Slip */}
                        {summary.netTotal > 0 && (
                            <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-blue-100 dark:border-blue-900 overflow-hidden mb-5 animate-pop">
                                <div className="bg-blue-600 text-white p-4 flex justify-between items-center"><h3 className="font-bold text-lg"><i className="fas fa-file-invoice-dollar mr-2"></i> สรุปยอดชำระ</h3><span className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">มัดจำเพื่อยืนยันสิทธิ์</span></div>
                                <div className="p-5">
                                    <div className="space-y-2 mb-4 text-sm text-gray-700 dark:text-gray-300">
                                        <div className="flex justify-between"><span>ค่าที่พัก ({form.rooms.length} ห้อง)</span><span>{formatMoney(summary.roomTotal)} ฿</span></div>
                                        {summary.foodTotal > 0 && <div className="flex justify-between text-orange-600 dark:text-orange-400"><span>ค่าอาหาร/บริการ</span><span>{formatMoney(summary.foodTotal)} ฿</span></div>}
                                        {summary.discount > 0 && <div className="flex justify-between text-green-600 font-bold"><span>ส่วนลด</span><span>-{formatMoney(summary.discount)} ฿</span></div>}
                                        <hr className="border-dashed border-gray-200 dark:border-gray-700 my-2" />
                                        <div className="flex justify-between text-lg font-bold text-gray-900 dark:text-white"><span>ยอดสุทธิรวม</span><span>{formatMoney(summary.netTotal)} ฿</span></div>
                                    </div>

                                    <div className="bg-blue-50 dark:bg-blue-900/30 rounded-xl p-4 border border-blue-100 dark:border-blue-800 text-center mb-5">
                                        <p className="text-sm text-blue-800 dark:text-blue-300 mb-1">ยอดที่ต้องโอนมัดจำ (50%)</p>
                                        <div className="text-3xl font-bold text-blue-600 dark:text-blue-400 my-2">{formatMoney(summary.deposit)} <span className="text-lg">บาท</span></div>
                                        
                                        <div className="mt-4 bg-white dark:bg-gray-800 p-3 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 inline-block w-48">
                                            <div className="text-xs text-gray-500 mb-1 font-bold">สแกนจ่ายพร้อมเพย์</div>
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${generatePromptPayPayload(SHOP_PROMPTPAY, summary.deposit)}`} alt="PromptPay QR" className="w-full h-auto" />
                                        </div>
                                        <div className="mt-3 text-sm text-gray-600 dark:text-gray-400 bg-white dark:bg-gray-800 py-2 px-4 rounded-full inline-flex items-center gap-2 border border-gray-200 dark:border-gray-700 shadow-sm">
                                            <i className="fas fa-university text-blue-500"></i> พร้อมเพย์: <b className="text-gray-800 dark:text-gray-200">{SHOP_PROMPTPAY}</b>
                                            <button onClick={() => { navigator.clipboard.writeText(SHOP_PROMPTPAY); showAlert("คัดลอกเบอร์พร้อมเพย์แล้ว", "คัดลอกสำเร็จ", "success"); }} className="text-blue-500 hover:text-blue-700 ml-1"><i className="far fa-copy"></i></button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">อัพโหลดสลิปโอนเงิน (Required) *</label>
                                        <label className={`block w-full border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${slipBase64 ? 'border-green-500 bg-green-50 dark:bg-green-900/20' : 'border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-800/50 bg-gray-50/50 dark:bg-gray-800/30'}`}>
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                            {slipBase64 ? (
                                                <div className="flex flex-col items-center">
                                                    <i className="fas fa-check-circle text-3xl text-green-500 mb-2"></i>
                                                    <span className="text-sm font-bold text-green-700 dark:text-green-400">อัพโหลดสลิปสำเร็จ</span>
                                                    <span className="text-xs text-gray-500 mt-1 underline">แตะเพื่อเปลี่ยนรูป</span>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center">
                                                    <div className="w-12 h-12 rounded-full bg-blue-100 dark:bg-blue-900/50 text-blue-500 flex items-center justify-center mb-2"><i className="fas fa-cloud-upload-alt text-xl"></i></div>
                                                    <span className="text-sm font-bold text-blue-600 dark:text-blue-400">แตะเพื่ออัพโหลดรูปภาพสลิป</span>
                                                    <span className="text-[10px] text-gray-400 mt-1">รองรับ JPG, PNG (ไม่เกิน 5MB)</span>
                                                </div>
                                            )}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Submit Button Sticky Bottom */}
                    <div className="fixed bottom-0 left-0 w-full bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-40">
                        <div className="max-w-3xl mx-auto flex items-center gap-4">
                            <div className="hidden sm:block flex-1 text-sm text-gray-600 dark:text-gray-400">
                                <div>รวม <b className="text-gray-900 dark:text-white">{form.rooms.length}</b> ห้อง, <b className="text-gray-900 dark:text-white">{form.food.reduce((s,i)=>s+i.qty,0)}</b> รายการ</div>
                                <div className="text-lg font-bold text-blue-600 dark:text-blue-400">{formatMoney(summary.deposit)} ฿</div>
                            </div>
                            <button onClick={handleSubmit} disabled={loading || form.rooms.length === 0 || summary.netTotal === 0} className="flex-1 sm:flex-none w-full sm:w-auto bg-green-600 text-white py-3.5 px-8 rounded-xl font-bold shadow-lg hover:bg-green-700 disabled:bg-gray-400 dark:disabled:bg-gray-700 disabled:shadow-none transition transform active:scale-[0.98] flex justify-center items-center gap-2">
                                ยืนยันการจองที่พัก <i className="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                    {/* --- MODALS --- */}
                    {modalAlert.show && ( <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity"> <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden animate-pop"> <div className={`p-6 text-center ${modalAlert.type === 'error' ? 'bg-red-50 dark:bg-red-900/20' : modalAlert.type === 'success' ? 'bg-green-50 dark:bg-green-900/20' : 'bg-blue-50 dark:bg-blue-900/20'}`}> <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${modalAlert.type === 'error' ? 'bg-red-100 text-red-500' : modalAlert.type === 'success' ? 'bg-green-100 text-green-500' : 'bg-blue-100 text-blue-500'}`}> <i className={`fas ${modalAlert.type === 'error' ? 'fa-times' : modalAlert.type === 'success' ? 'fa-check' : 'fa-info'} text-3xl`}></i> </div> <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2">{modalAlert.title}</h3> <p className="text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap">{modalAlert.text}</p> </div> <div className="p-4 bg-gray-50 dark:bg-gray-700"> <button onClick={() => setModalAlert({ ...modalAlert, show: false })} className="w-full py-3 bg-gray-800 dark:bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700 transition shadow">ตกลง</button> </div> </div> </div> )}
                    {modalConfirm.show && ( <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity"> <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden animate-pop"> <div className="p-6 text-center"> <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-blue-100 text-blue-500"> <i className="fas fa-question text-3xl"></i> </div> <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2">{modalConfirm.title}</h3> <p className="text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap">{modalConfirm.text}</p> </div> <div className="p-4 bg-gray-50 dark:bg-gray-700 flex gap-2"> <button onClick={() => setModalConfirm({ ...modalConfirm, show: false })} className="flex-1 py-2.5 bg-white dark:bg-gray-600 border border-gray-300 dark:border-gray-500 text-gray-700 dark:text-gray-200 rounded-xl font-bold hover:bg-gray-50 transition">ยกเลิก</button> <button onClick={modalConfirm.onConfirm} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow">ยืนยัน</button> </div> </div> </div> )}

                        {/* --- CAMPING LOADING OVERLAY --- */}
                        {loading && siteSettings && <CampingLoader text={loadingText} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
